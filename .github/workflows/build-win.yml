name: build-win-portable

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S . -B build -DLANTALK_ENABLE_DESKTOP=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/LanTalk | Out-Null
          if (Test-Path "build/Release/lantalk.exe") {
            Copy-Item build/Release/lantalk.exe dist/LanTalk/LanTalk.exe -Force
          } elseif (Test-Path "build/lantalk.exe") {
            Copy-Item build/lantalk.exe dist/LanTalk/LanTalk.exe -Force
          } else {
            throw "lantalk.exe not found"
          }
          New-Item -ItemType Directory -Force -Path dist/LanTalk/data | Out-Null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanTalk-win-x64
          path: dist/LanTalk
