name: build-win-portable

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S . -B out -DLANTALK_DESKTOP=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build out --config Release

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/LanTalk | Out-Null
          if (Test-Path "out/Release/lantalk.exe") {
            Copy-Item "out/Release/lantalk.exe" "dist/LanTalk/LanTalk.exe" -Force
          } elseif (Test-Path "out/lantalk.exe") {
            Copy-Item "out/lantalk.exe" "dist/LanTalk/LanTalk.exe" -Force
          } else {
            throw "lantalk.exe not found"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanTalk-win-x64
          path: dist/LanTalk
