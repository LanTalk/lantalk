name: build-win-portable

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup MinGW (for cgo/fyne)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: echo "C:\\msys64\\mingw64\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download deps
        run: go mod download

      - name: Create dist folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist/LanTalk | Out-Null

      - name: Build exe
        run: go build -trimpath -ldflags "-s -w -H=windowsgui" -o dist/LanTalk/LanTalk.exe .

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/LanTalk/data | Out-Null
          Copy-Item README.md dist/LanTalk/README.md -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanTalk-win-x64
          path: dist/LanTalk
