name: windows-build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          aqtversion: "==3.2.*"

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (x64)
        run: cmake -S . -B build -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          if (Test-Path "build/Release/lantalk.exe") {
            $exe = "build/Release/lantalk.exe"
          } elseif (Test-Path "build/lantalk.exe") {
            $exe = "build/lantalk.exe"
          } else {
            throw "lantalk.exe not found"
          }
          # Do not let windeployqt drop VC redist installers into artifact.
          # We copy exact CRT DLLs below.
          & windeployqt --release --no-translations --no-compiler-runtime --dir out $exe
          Copy-Item $exe "out/LanTalk.exe" -Force

          $requiredRuntime = @(
            "msvcp140.dll",
            "msvcp140_1.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll",
            "concrt140.dll"
          )

          $runtimeRoots = @()
          if ($env:VCToolsRedistDir) {
            $runtimeRoots += Join-Path $env:VCToolsRedistDir "x64/Microsoft.VC143.CRT"
            $runtimeRoots += Join-Path $env:VCToolsRedistDir "x64/Microsoft.VC142.CRT"
          }
          if ($env:VCToolsInstallDir) {
            $toolsRedistBase = Join-Path $env:VCToolsInstallDir "..\..\..\Redist\MSVC"
            if (Test-Path $toolsRedistBase) {
              $runtimeRoots += Get-ChildItem "$toolsRedistBase\*\x64\Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending | ForEach-Object { $_.FullName }
            }
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
            if ($LASTEXITCODE -eq 0 -and $vsPath) {
              $msvcRedistBase = Join-Path $vsPath "VC\Redist\MSVC"
              if (Test-Path $msvcRedistBase) {
                $runtimeRoots += Get-ChildItem "$msvcRedistBase\*\x64\Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending | ForEach-Object { $_.FullName }
              }
            }
          }
          $runtimeRoots = $runtimeRoots | Select-Object -Unique

          if (-not $runtimeRoots -or $runtimeRoots.Count -eq 0) {
            throw "MSVC redist directory not found; cannot bundle compiler runtime."
          }

          foreach ($root in $runtimeRoots) {
            Get-ChildItem (Join-Path $root "*.dll") -File -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName (Join-Path "out" $_.Name) -Force
            }
          }

          foreach ($dll in $requiredRuntime) {
            $target = Join-Path "out" $dll
            if (Test-Path $target) {
              continue
            }
            $copied = $false
            foreach ($root in $runtimeRoots) {
              $candidate = Join-Path $root $dll
              if (Test-Path $candidate) {
                Copy-Item $candidate $target -Force
                $copied = $true
                break
              }
            }
            if (-not $copied -and $env:WINDIR) {
              $sysCandidate = Join-Path $env:WINDIR ("System32\" + $dll)
              if (Test-Path $sysCandidate) {
                Copy-Item $sysCandidate $target -Force
                $copied = $true
              }
            }
            if (-not $copied -or -not (Test-Path $target)) {
              throw "Missing runtime dependency: $dll"
            }
          }

          # Artifact must not contain runtime installers; keep only runtime DLLs.
          Get-ChildItem out -File -ErrorAction SilentlyContinue | Where-Object {
            $_.Name -match "^(vc_redist|vcredist).*\.(exe|msi)$"
          } | Remove-Item -Force
          $unexpectedInstallers = Get-ChildItem out -File -ErrorAction SilentlyContinue | Where-Object {
            $_.Name -match "^(vc_redist|vcredist).*\.(exe|msi)$"
          }
          if ($unexpectedInstallers.Count -gt 0) {
            throw "Unexpected runtime installer file remains in artifact."
          }

          @'
          Run LanTalk.exe from this folder.
          Do not move LanTalk.exe out by itself; runtime DLLs must stay beside it.
          '@ | Set-Content -Path "out/README-runtime.txt" -Encoding UTF8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanTalk-windows-x64
          path: out/
          if-no-files-found: error
