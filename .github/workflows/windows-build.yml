name: windows-build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"

      - name: Configure (x64)
        run: cmake -S . -B build -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          if (Test-Path "build/Release/lantalk.exe") {
            $exe = "build/Release/lantalk.exe"
          } elseif (Test-Path "build/lantalk.exe") {
            $exe = "build/lantalk.exe"
          } else {
            throw "lantalk.exe not found"
          }
          & windeployqt --release --no-translations --compiler-runtime --dir out $exe
          Copy-Item $exe "out/LanTalk.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanTalk-windows-x64
          path: out/
          if-no-files-found: error
