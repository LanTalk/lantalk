<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LanTalk Web</title>
  <link rel="stylesheet" href="https://registry.npmmirror.com/lxgw-wenkai-screen-web/latest/files/style.css" />
  <link rel="icon" type="image/svg+xml" href="./app_icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./app_icon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="avatar-wrap">
        <img id="selfAvatar" class="avatar-lg" alt="self" />
      </div>
      <button id="openSettingsBtn" class="icon-btn" title="设置">⚙</button>
    </aside>

    <section class="sessions">
      <div class="search-wrap">
        <input id="searchInput" placeholder="搜索联系人" />
      </div>
      <div id="contactList" class="contact-list"></div>
    </section>

    <main class="chat">
      <header class="chat-header">
        <div class="chat-title-wrap">
          <img class="web-logo" src="./app_icon.png" alt="LanTalk" />
          <div id="chatTitle" class="chat-title">聊天窗口</div>
        </div>
      </header>

      <section id="messages" class="messages"></section>

      <section class="composer">
        <div class="tool-row">
          <button id="emojiBtn" class="tool-btn" title="表情">☺</button>
        </div>
        <div class="input-row">
          <textarea id="inputBox" placeholder="输入消息（Enter发送，Shift+Enter换行）"></textarea>
          <button id="sendBtn" class="send-btn">发送</button>
        </div>
      </section>
    </main>
  </div>

  <dialog id="settingsDialog" class="settings-dialog">
    <h3>个人设置</h3>
    <label>昵称 <input id="nameInput" /></label>
    <label>用户ID <input id="idInput" disabled /></label>
    <label>信令服务器（每行一个）
      <textarea id="serversInput" rows="4" placeholder="https://lantalk-signal.example.workers.dev"></textarea>
    </label>
    <div class="dialog-actions">
      <button id="cancelSettingsBtn">取消</button>
      <button id="saveSettingsBtn" class="primary">保存</button>
    </div>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
