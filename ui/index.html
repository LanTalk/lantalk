<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LanTalk</title>
  <style>
    :root {
      --bg-rail: #eceff3;
      --bg-list: #f8f9fb;
      --bg-chat: #ffffff;
      --line: #e2e6ec;
      --text: #1f2329;
      --sub: #7a838f;
      --primary: #3592ff;
      --bubble-in: #f2f4f7;
      --bubble-out: #dcebff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--text); }
    .app { display: grid; grid-template-columns: 64px 320px 1fr; height: 100vh; background: var(--bg-chat); }
    .rail { background: var(--bg-rail); border-right: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; padding: 10px 0; }
    .avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #7aaeff, #4d8fff); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .spacer { flex: 1; }
    .icon-btn { border: 0; background: transparent; cursor: pointer; width: 36px; height: 36px; border-radius: 10px; color: #556070; }
    .icon-btn:hover { background: #dde3eb; }

    .list { background: var(--bg-list); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
    .list-head { padding: 12px; font-weight: 700; border-bottom: 1px solid var(--line); }
    .sessions { overflow: auto; }
    .session { display: grid; grid-template-columns: 36px 1fr; gap: 8px; align-items: center; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #f0f2f5; }
    .session.active { background: #edf5ff; }
    .session-avatar { width: 36px; height: 36px; border-radius: 10px; background: #d4dbe5; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #556070; }
    .session-main { min-width: 0; }
    .session-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 999px; background: #9da6b3; }
    .dot.on { background: #33be58; }
    .session-preview { margin-top: 4px; font-size: 12px; color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .chat { display: grid; grid-template-rows: 64px 1fr auto; background: var(--bg-chat); }
    .chat-head { border-bottom: 1px solid var(--line); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .peer-title { font-size: 16px; font-weight: 700; }
    .peer-sub { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .messages { padding: 14px 18px; overflow: auto; background: #fdfefe; }
    .empty { height: 100%; display: grid; place-items: center; color: #97a0ad; font-size: 14px; }
    .msg-row { margin: 10px 0; display: flex; }
    .msg-row.out { justify-content: flex-end; }
    .msg-bubble { max-width: min(560px, 70%); padding: 9px 12px; border-radius: 12px; line-height: 1.45; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg-row.in .msg-bubble { background: var(--bubble-in); }
    .msg-row.out .msg-bubble { background: var(--bubble-out); }
    .msg-time { font-size: 11px; color: #96a0ad; margin-top: 4px; }

    .composer { border-top: 1px solid var(--line); background: #fff; }
    .composer-tools { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--line); }
    .composer-input { width: 100%; min-height: 96px; border: 0; padding: 10px 14px 12px; resize: vertical; outline: none; font: inherit; line-height: 1.45; }

    .dialog-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.06); display: none; align-items: center; justify-content: center; }
    .dialog { width: 360px; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
    .dialog-title { margin: 0 0 12px 0; font-size: 16px; }
    .input { width: 100%; border: 1px solid #d9dfe7; border-radius: 8px; padding: 8px 10px; font: inherit; }
    .dialog-foot { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    .btn { border: 1px solid #d0d8e2; background: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; }
    .btn.primary { border-color: var(--primary); background: var(--primary); color: #fff; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="avatar" id="selfAvatar">LT</div>
      <div class="spacer"></div>
      <button class="icon-btn" id="openSettings" title="设置">⚙</button>
    </aside>

    <section class="list">
      <div class="list-head">会话</div>
      <div class="sessions" id="sessionList"></div>
    </section>

    <section class="chat">
      <header class="chat-head">
        <div>
          <div class="peer-title" id="peerTitle">请选择联系人</div>
          <div class="peer-sub" id="peerSub">离线</div>
        </div>
        <button class="icon-btn" title="资料">ⓘ</button>
      </header>

      <main class="messages" id="messagePane">
        <div class="empty">右侧显示聊天内容</div>
      </main>

      <footer class="composer">
        <div class="composer-tools">
          <button class="icon-btn" title="表情">😊</button>
          <button class="icon-btn" title="图片">🖼</button>
          <button class="icon-btn" title="文件">📎</button>
        </div>
        <textarea class="composer-input" id="inputBox" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
      </footer>
    </section>
  </div>

  <div class="dialog-mask" id="settingsMask">
    <div class="dialog">
      <h3 class="dialog-title">个人设置</h3>
      <input class="input" id="selfNameInput" maxlength="32" />
      <div class="dialog-foot">
        <button class="btn" id="closeSettings">取消</button>
        <button class="btn primary" id="saveSettings">保存</button>
      </div>
    </div>
  </div>

  <script>
    let self = null;
    let conversations = [];
    let activePeerId = "";

    const el = {
      selfAvatar: document.getElementById("selfAvatar"),
      sessionList: document.getElementById("sessionList"),
      peerTitle: document.getElementById("peerTitle"),
      peerSub: document.getElementById("peerSub"),
      messagePane: document.getElementById("messagePane"),
      inputBox: document.getElementById("inputBox"),
      openSettings: document.getElementById("openSettings"),
      settingsMask: document.getElementById("settingsMask"),
      closeSettings: document.getElementById("closeSettings"),
      saveSettings: document.getElementById("saveSettings"),
      selfNameInput: document.getElementById("selfNameInput")
    };

    function avatarText(name) {
      if (!name) return "LT";
      return name.trim().slice(0, 2).toUpperCase();
    }

    function formatTime(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }

    async function loadSelf() {
      self = JSON.parse(await nativeSelf());
      el.selfAvatar.textContent = avatarText(self.name);
      el.selfNameInput.value = self.name;
    }

    async function loadConversations() {
      conversations = JSON.parse(await nativeConversations());
      renderSessions();
      if (activePeerId && !conversations.find(x => x.id === activePeerId)) {
        activePeerId = "";
      }
      if (!activePeerId && conversations.length) {
        activePeerId = conversations[0].id;
      }
      renderHeader();
      renderMessages();
    }

    function renderSessions() {
      el.sessionList.innerHTML = "";
      for (const c of conversations) {
        const row = document.createElement("div");
        row.className = "session" + (c.id === activePeerId ? " active" : "");
        row.innerHTML = `
          <div class="session-avatar">${avatarText(c.name)}</div>
          <div class="session-main">
            <div class="session-name">${escapeHtml(c.name)} <span class="dot ${c.online ? "on" : ""}"></span></div>
            <div class="session-preview">${escapeHtml(c.lastText || "暂无聊天记录")}</div>
          </div>
        `;
        row.addEventListener("click", () => {
          activePeerId = c.id;
          renderSessions();
          renderHeader();
          renderMessages();
        });
        el.sessionList.appendChild(row);
      }
    }

    function renderHeader() {
      const c = conversations.find(x => x.id === activePeerId);
      if (!c) {
        el.peerTitle.textContent = "请选择联系人";
        el.peerSub.textContent = "离线";
        return;
      }
      el.peerTitle.textContent = c.name;
      el.peerSub.textContent = c.online ? "在线" : "离线";
    }

    async function renderMessages() {
      if (!activePeerId) {
        el.messagePane.innerHTML = `<div class="empty">右侧显示聊天内容</div>`;
        return;
      }
      const list = JSON.parse(await nativeMessages(activePeerId));
      if (!list.length) {
        el.messagePane.innerHTML = `<div class="empty">暂无消息</div>`;
        return;
      }

      const frag = document.createDocumentFragment();
      for (const m of list) {
        const row = document.createElement("div");
        row.className = "msg-row " + (m.outgoing ? "out" : "in");
        row.innerHTML = `
          <div>
            <div class="msg-bubble">${escapeHtml(m.text)}</div>
            <div class="msg-time">${formatTime(m.sentAt)}</div>
          </div>
        `;
        frag.appendChild(row);
      }
      el.messagePane.innerHTML = "";
      el.messagePane.appendChild(frag);
      el.messagePane.scrollTop = el.messagePane.scrollHeight;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function sendNow() {
      const text = el.inputBox.value.trim();
      if (!text || !activePeerId) return;
      const ok = await nativeSendText(activePeerId, text);
      if (!ok) return;
      el.inputBox.value = "";
      await loadConversations();
      await renderMessages();
    }

    el.inputBox.addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        await sendNow();
      }
    });

    el.openSettings.addEventListener("click", () => {
      el.selfNameInput.value = self?.name || "";
      el.settingsMask.style.display = "flex";
    });

    el.closeSettings.addEventListener("click", () => {
      el.settingsMask.style.display = "none";
    });

    el.saveSettings.addEventListener("click", async () => {
      const val = el.selfNameInput.value.trim();
      if (!val) return;
      const ok = await nativeRenameSelf(val);
      if (!ok) return;
      el.settingsMask.style.display = "none";
      await loadSelf();
      await loadConversations();
    });

    (async function boot() {
      await loadSelf();
      await loadConversations();
    })();
  </script>
</body>
</html>
